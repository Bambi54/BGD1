<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 800 740" font-family="ui-sans-serif, system-ui, sans-serif">
<style>
  .bg    { fill: #f1efe8; stroke: #b4b2a9; }
  .orch  { fill: #eeedfe; stroke: #7f77dd; }
  .spark { fill: #e1f5ee; stroke: #1d9e75; }
  .store { fill: #faeeda; stroke: #ba7517; }
  .inner { fill: #ffffff; stroke: #9c9a92; stroke-width: 0.5; }
  .th    { font-size: 13px; font-weight: 600; fill: #26215c; }
  .ts    { font-size: 11px; fill: #534ab7; }
  .ths   { font-size: 13px; font-weight: 600; fill: #085041; }
  .tss   { font-size: 11px; fill: #0f6e56; }
  .tha   { font-size: 13px; font-weight: 600; fill: #633806; }
  .tg    { font-size: 11px; fill: #3d3d3a; }
  .arr   { stroke: #888780; stroke-width: 1.5; fill: none; }
  .title { font-size: 15px; font-weight: 700; fill: #2c2c2a; }
  .sub   { font-size: 11px; fill: #5f5e5a; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="20" y="20" width="760" height="700" rx="16" class="bg" stroke-width="0.8"/>
<text x="40" y="52" class="title">NYC Taxi — Dagster + PySpark medallion pipeline</text>
<text x="40" y="68" class="sub">Orchestration: Dagster 1.9 (asset-centric DAG, UI at localhost:3000)   |   Processing: PySpark 3.5 (local[*] → cluster)   |   Storage: PostgreSQL 15</text>

<rect x="40" y="84" width="720" height="200" rx="12" class="orch" stroke-width="0.8"/>
<text x="60" y="108" class="th">Dagster — orchestration layer</text>
<text x="60" y="124" class="ts">schedules, retries, lineage, asset catalog, run history</text>

<rect x="60" y="136" width="168" height="48" rx="8" class="inner"/>
<text x="144" y="157" text-anchor="middle" class="th">Dagster daemon</text>
<text x="144" y="174" text-anchor="middle" class="ts">scheduler + sensor loop</text>

<rect x="244" y="136" width="168" height="48" rx="8" class="inner"/>
<text x="328" y="157" text-anchor="middle" class="th">Dagster webserver</text>
<text x="328" y="174" text-anchor="middle" class="ts">UI at localhost:3000</text>

<rect x="428" y="136" width="160" height="48" rx="8" class="inner"/>
<text x="508" y="157" text-anchor="middle" class="th">IO managers</text>
<text x="508" y="174" text-anchor="middle" class="ts">Parquet / JDBC output</text>

<rect x="60" y="200" width="168" height="48" rx="8" class="inner"/>
<text x="144" y="221" text-anchor="middle" class="th">Schedules</text>
<text x="144" y="238" text-anchor="middle" class="ts">cron 03:00 daily</text>

<rect x="244" y="200" width="168" height="48" rx="8" class="inner"/>
<text x="328" y="221" text-anchor="middle" class="th">Asset catalog</text>
<text x="328" y="238" text-anchor="middle" class="ts">lineage + freshness</text>

<rect x="428" y="200" width="160" height="48" rx="8" class="inner"/>
<text x="508" y="221" text-anchor="middle" class="th">Run history</text>
<text x="508" y="238" text-anchor="middle" class="ts">logs, alerts, retries</text>

<line x1="400" y1="284" x2="400" y2="312" class="arr" marker-end="url(#arr)"/>

<rect x="40" y="312" width="720" height="220" rx="12" class="spark" stroke-width="0.8"/>
<text x="60" y="336" class="ths">PySpark — processing layer</text>
<text x="60" y="352" class="tss">local[*] for dev; change SPARK_MASTER env var to point at a cluster — no code changes needed</text>

<rect x="60" y="364" width="192" height="60" rx="8" class="inner"/>
<text x="156" y="389" text-anchor="middle" class="ths">Bronze asset</text>
<text x="156" y="406" text-anchor="middle" class="tss">read_parquet from TLC CDN</text>
<text x="156" y="420" text-anchor="middle" class="tss">write → bronze.raw_trips</text>

<line x1="252" y1="394" x2="280" y2="394" class="arr" marker-end="url(#arr)"/>

<rect x="280" y="364" width="180" height="60" rx="8" class="inner"/>
<text x="370" y="389" text-anchor="middle" class="ths">Silver asset</text>
<text x="370" y="406" text-anchor="middle" class="tss">cast, filter, dedup</text>
<text x="370" y="420" text-anchor="middle" class="tss">write → silver.clean_trips</text>

<line x1="460" y1="394" x2="488" y2="394" class="arr" marker-end="url(#arr)"/>

<rect x="488" y="364" width="252" height="60" rx="8" class="inner"/>
<text x="614" y="385" text-anchor="middle" class="ths">Gold assets A / B / C</text>
<text x="614" y="401" text-anchor="middle" class="tss">zone_demand_trend (GROUP BY)</text>
<text x="614" y="417" text-anchor="middle" class="tss">hourly_fare_profile (JOIN+agg)</text>
<text x="614" y="430" text-anchor="middle" class="tss">driver_revenue_rank (RANK())</text>

<rect x="60" y="444" width="192" height="44" rx="8" class="inner"/>
<text x="156" y="471" text-anchor="middle" class="ths">SparkSession</text>

<rect x="280" y="444" width="180" height="44" rx="8" class="inner"/>
<text x="370" y="471" text-anchor="middle" class="ths">local[*] — dev mode</text>

<rect x="488" y="444" width="252" height="44" rx="8" class="inner"/>
<text x="614" y="471" text-anchor="middle" class="ths">swap SPARK_MASTER → cluster URL</text>

<line x1="400" y1="532" x2="400" y2="560" class="arr" marker-end="url(#arr)"/>

<rect x="40" y="560" width="720" height="110" rx="12" class="store" stroke-width="0.8"/>
<text x="60" y="584" class="tha">Storage layer</text>

<rect x="60" y="596" width="220" height="48" rx="8" class="inner"/>
<text x="170" y="617" text-anchor="middle" class="tha">PostgreSQL 15</text>
<text x="170" y="634" text-anchor="middle" class="tg">bronze / silver / gold schemas</text>

<rect x="300" y="596" width="180" height="48" rx="8" class="inner"/>
<text x="390" y="617" text-anchor="middle" class="tha">Parquet cache</text>
<text x="390" y="634" text-anchor="middle" class="tg">TLC source files (local)</text>

<rect x="500" y="596" width="240" height="48" rx="8" class="inner"/>
<text x="620" y="617" text-anchor="middle" class="tha">Dagster metadata DB</text>
<text x="620" y="634" text-anchor="middle" class="tg">run history, asset state</text>

<text x="400" y="695" text-anchor="middle" class="sub">localhost:3000 Dagster UI   |   localhost:5432 PostgreSQL   |   docker compose up --build</text>

</svg>
